<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#0f172a" rx="24"/>
  
  <!-- Background pattern: subtle grid -->
  <g opacity="0.03" stroke="#fff" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/><line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Graph icon (scaled from favicon) -->
  <g transform="translate(160, 255) scale(1.8)">
    <rect x="32" y="32" width="36" height="36" rx="6" fill="#6366f1"/>
    <circle cx="50" cy="50" r="6" fill="#fff"/>
    <circle cx="18" cy="30" r="9" fill="#3b82f6"/>
    <circle cx="82" cy="30" r="9" fill="#22c55e"/>
    <circle cx="18" cy="70" r="9" fill="#f59e0b"/>
    <circle cx="82" cy="70" r="9" fill="#a855f7"/>
    <circle cx="50" cy="18" r="9" fill="#ec4899"/>
    <line x1="35" y1="39" x2="25" y2="37" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
    <line x1="65" y1="39" x2="75" y2="37" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
    <line x1="35" y1="61" x2="25" y2="63" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
    <line x1="65" y1="61" x2="75" y2="63" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
    <line x1="50" y1="35" x2="50" y2="25" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Title -->
  <text x="380" y="290" font-family="system-ui, sans-serif" font-size="64" font-weight="bold" fill="#f1f5f9">Marble Taxonomy</text>
  <text x="380" y="360" font-family="system-ui, sans-serif" font-size="64" font-weight="bold" fill="#818cf8">Explorer</text>

  <!-- Stats row -->
  <g transform="translate(380, 410)" font-family="system-ui, sans-serif" font-size="22" fill="#94a3b8">
    <text x="0" y="0">1,590 topics</text>
    <circle cx="160" cy="-4" r="3" fill="#475569"/>
    <text x="180" y="0">8 subjects</text>
    <circle cx="336" cy="-4" r="3" fill="#475569"/>
    <text x="356" y="0">3,221 dependencies</text>
    <circle cx="556" cy="-4" r="3" fill="#475569"/>
    <text x="576" y="0">1,603 pages</text>
  </g>

  <!-- Footer -->
  <text x="380" y="520" font-family="system-ui, sans-serif" font-size="16" fill="#475569">Community tool — not affiliated with Marble</text>
  <text x="380" y="548" font-family="system-ui, sans-serif" font-size="14" fill="#334155">ashutoshsinghpr7.github.io/marble-taxonomy-explorer</text>
</svg>
